apiVersion: v1
kind: cypress
sauce:
  region: eu-central-1 # or us-west-1
  # combined with the shard:concurrency setting
  concurrency: 75
  metadata:
    tags:
      - cypress
      - cross-platform
      - webkit
    build: "config-ex3 $CURRENT_TIME"
cypress:
  version: package.json
  configFile: "cypress.config.js" # We determine related files based on the location of the config file.
# Controls what files are available in the context of a test run (unless explicitly excluded by .sauceignore).
rootDir: ./
suites:
#  # Chrome
#  - name: "Swag Labs Shard Tests Webkit Windows"
#    browser: "webkit"
#    platformName: "Windows 11"
#    screenResolution: "1400x1050"
#    shard: spec
#    config:
#      specPattern: ["**/login.*", "**/checkout.*"]
  # Firefox
  - name: "Swag Labs Shard Tests Webkit macOS"
    browser: "webkit"
    platformName: "macOS 13"
    screenResolution: "1440x900"
    shard: spec
    config:
      specPattern: ["**/login.*", "**/checkout.*"]